apiVersion: v1
kind: Service
metadata:
  name: {{ include "dmp.fullname" . }}-sso-http
  labels:
    {{- include "dmp.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: sso-http
spec:
  type: {{ .Values.sso.http.service.type }}
  ports:
    {{- range $key, $value := .Values.sso.http.service.ports }}
    - port: {{ $value }}
      targetPort: {{ $key }}
      protocol: TCP
      name: {{ $key }}
    {{- end }}
  selector:
    {{- include "dmp.labels.matchLabels" . | nindent 4 }}
    app.kubernetes.io/component: sso-http
