apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "dmp.fullname" . }}-sso-init
  labels:
    {{- include "dmp.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: sso-http-init
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "dmp.labels.standard" . | nindent 8 }}
        app.kubernetes.io/component: sso-http-init
    spec:
      serviceAccountName: {{ include "sso.serviceAccountName" . }}
      restartPolicy: Never
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.global.imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if .Values.sso.postgresql.waitForPostgresql.enabled }}
      initContainers:
        - name: wait-for-postgresql
          image: {{ include "dmp.image" (dict "imageRoot" .Values.sso.postgresql.waitForPostgresql.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.sso.postgresql.waitForPostgresql.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.sso.postgresql.host }} {{ .Values.sso.postgresql.port }}; do
                echo "Waiting for PostgreSQL at {{ .Values.sso.postgresql.host }}:{{ .Values.sso.postgresql.port }}..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
      {{- end }}
      containers:
        - name: init-sso
          image: {{ include "dmp.image" (dict "imageRoot" .Values.sso.http.initContainer.image "global" .Values.global) }}
          {{- if or .Values.sso.extraEnv .Values.sso.extraSecretEnv }}
          env:
            {{- range $key, $value := .Values.sso.extraEnv }}
            - name: {{ $key | quote }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.sso.extraSecretEnv }}
            - name: {{ $key | quote }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "dmp.fullname" $ }}-sso-env
                  key: {{ $key | quote }}
            {{- end }}
          {{- end }}
          imagePullPolicy: {{ .Values.sso.http.initContainer.image.pullPolicy }}
          {{- if .Values.sso.http.initContainer.command }}
          command:
            {{- toYaml .Values.sso.http.initContainer.command | nindent 12 }}
          {{- end }}
