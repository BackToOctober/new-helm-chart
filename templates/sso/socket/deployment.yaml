{{- if .Values.sso.socket.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dmp.fullname" . }}-sso-socket
  labels:
    {{- include "dmp.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: sso-socket
spec:
  replicas: {{ .Values.sso.socket.replicaCount }}
  selector:
    matchLabels:
      {{- include "dmp.labels.matchLabels" . | nindent 6 }}
      app.kubernetes.io/component: sso-socket
  template:
    metadata:
      labels:
        {{- include "dmp.labels.standard" . | nindent 8 }}
        app.kubernetes.io/component: sso-socket
    spec:
      serviceAccountName: {{ include "sso.serviceAccountName" . }}
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.global.imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if .Values.sso.postgresql.waitForPostgresql.enabled }}
      initContainers:
        - name: wait-for-postgresql
          image: {{ include "dmp.image" (dict "imageRoot" .Values.sso.postgresql.waitForPostgresql.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.sso.postgresql.waitForPostgresql.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.sso.postgresql.host }} {{ .Values.sso.postgresql.port }}; do
                echo "Waiting for PostgreSQL at {{ .Values.sso.postgresql.host }}:{{ .Values.sso.postgresql.port }}..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
      {{- end }}
      containers:
        - name: sso-socket
          image: {{ include "dmp.image" (dict "imageRoot" .Values.sso.socket.image "global" .Values.global) }}

          {{- if or .Values.sso.extraEnv .Values.sso.extraSecretEnv }}
          env:
            {{- range $key, $value := .Values.sso.extraEnv }}
            - name: {{ $key | quote }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.sso.extraSecretEnv }}
            - name: {{ $key | quote }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "dmp.fullname" $ }}-sso-env
                  key: {{ $key | quote }}
            {{- end }}
          {{- end }}
          imagePullPolicy: {{ .Values.sso.socket.image.pullPolicy }}
          {{- if .Values.sso.socket.livenessProbe.enabled }}
          livenessProbe:
            {{- if .Values.sso.socket.livenessProbe.httpGet }}
            httpGet:
              path: {{ .Values.sso.socket.livenessProbe.httpGet.path }}
              port: {{ .Values.sso.socket.livenessProbe.httpGet.port }}
            {{- else if .Values.sso.socket.livenessProbe.tcpSocket }}
            tcpSocket:
              port: {{ .Values.sso.socket.livenessProbe.tcpSocket.port }}
            {{- end }}
            initialDelaySeconds: {{ .Values.sso.socket.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.sso.socket.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.sso.socket.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.sso.socket.livenessProbe.failureThreshold }}
            {{- if .Values.sso.socket.livenessProbe.successThreshold }}
            successThreshold: {{ .Values.sso.socket.livenessProbe.successThreshold }}
            {{- end }}
          {{- end }}
          {{- if .Values.sso.socket.readinessProbe.enabled }}
          readinessProbe:
            {{- if .Values.sso.socket.readinessProbe.httpGet }}
            httpGet:
              path: {{ .Values.sso.socket.readinessProbe.httpGet.path }}
              port: {{ .Values.sso.socket.readinessProbe.httpGet.port }}
            {{- else if .Values.sso.socket.readinessProbe.tcpSocket }}
            tcpSocket:
              port: {{ .Values.sso.socket.readinessProbe.tcpSocket.port }}
            {{- end }}
            initialDelaySeconds: {{ .Values.sso.socket.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.sso.socket.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.sso.socket.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.sso.socket.readinessProbe.failureThreshold }}
            {{- if .Values.sso.socket.readinessProbe.successThreshold }}
            successThreshold: {{ .Values.sso.socket.readinessProbe.successThreshold }}
            {{- end }}
          {{- end }}
          {{- if .Values.sso.config.enabled }}
          envFrom:
            - configMapRef:
                name: {{ include "dmp.fullname" . }}-sso-config
          {{- end }}
          ports:
            {{- range $key, $value := .Values.sso.socket.service.ports }}
            - name: {{ $key }}
              containerPort: {{ $value }}
              protocol: TCP
            {{- end }}
          {{- if and .Values.sso.config.enabled .Values.sso.config.files }}
          volumeMounts:
            - name: sso-config-volume
              mountPath: {{ .Values.sso.config.mountPath }}
          {{- end }}
      {{- if and .Values.sso.config.enabled .Values.sso.config.files }}
      volumes:
        - name: sso-config-volume
          configMap:
            name: {{ include "dmp.fullname" . }}-sso-config
      {{- end }}
{{- end }}
